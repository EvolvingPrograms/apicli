name: CI

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

# Cancel in-progress runs on the same branch — except master/main,
# where each commit's pass/fail signal is load-bearing.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' && github.ref != 'refs/heads/main' }}

jobs:
  test:
    name: lint + typecheck + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Unit tests (with coverage)
        run: bun run test:coverage

  qa:
    name: integration qa tests
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile
      - run: bun run test:qa

  publish-dry-run:
    name: pack (dry run)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      # `npm pack --dry-run` shows the file list the package would
      # publish. CI fails if `files` accidentally drops src or
      # includes tests.
      - name: Pack (dry run)
        run: npm pack --dry-run
